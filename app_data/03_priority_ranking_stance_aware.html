    <div>                        <script type="text/javascript">window.PlotlyConfig = {MathJaxConfig: 'local'};</script>
        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.3.1.min.js" integrity="sha256-4rD3fugVb/nVJYUv5Ky3v+fYXoouHaBSP20WIJuEiWg=" crossorigin="anonymous"></script>                <div id="2c2b76f3-3641-411c-8761-80758ced1a69" class="plotly-graph-div" style="height:780px; width:100%;"></div>            <script type="text/javascript">                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("2c2b76f3-3641-411c-8761-80758ced1a69")) {                    Plotly.newPlot(                        "2c2b76f3-3641-411c-8761-80758ced1a69",                        [{"customdata":[["\ud83d\udde3\ufe0f i\u2019m southeast asian and even the cheapest shein clothes still\u003cbr\u003equite expensive for me so i\u2019ve never buy one. i rarely buy new\u003cbr\u003eclothes, when i do i bought them from thrifted and will only buy\u003cbr\u003eone if it\u2019s around $3 or under $6 (though in my country,\u003cbr\u003ethrifting has become sooo well known that sellers can charge for\u003cbr\u003emore than $10 for a single used clothes). all those fast fashion\u003cbr\u003ebrand such as h&m, zara, forever21 and uniqlo to me is an\u003cbr\u003eexpensive brand. i only have 1 or 2 clothes with that brand and i\u003cbr\u003etreasure them so much and i use it for special occasions. this is\u003cbr\u003eso sad that those are actually cheap clothes and they throw away\u003cbr\u003ehundred clothes meanwhile in another side of world, there\u2019s\u003cbr\u003esomeone who actually treasure the brand with thoughts it\u2019s an\u003cbr\u003eexpensive brand.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i'm in the sort of weird \"stuck\u003cbr\u003ebetween a rock and a hard place\" clothing sphere. i buy cheap\u003cbr\u003eclothes because that's all i can afford. i am aware of how bad it\u003cbr\u003eis for the people who make it and the environment, however i have\u003cbr\u003eno choice in the matter due to constant financial struggles.\u003cbr\u003ewhile i buy cheap, i also buy seldom. last time i bought clothes\u003cbr\u003ewas 2020. while i participate in what you would call \"fast\u003cbr\u003efashion\" i actually keep my clothes for years and years until\u003cbr\u003ethey cant be publicly presentable anymore, at which point they\u003cbr\u003ebecome at home clothes until they get so damaged that repairing\u003cbr\u003ethem just isn't worth the hassle.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f some people such as\u003cbr\u003emyself shop from shein out of necessity. i have $150 for the\u003cbr\u003ewhole season, not for a couple of pieces. ethical fashion is very\u003cbr\u003eout of reach for me. yes i shop thrift stores but honestly thrift\u003cbr\u003estores are increasing picked through by resellers and i end up\u003cbr\u003efeeling not put together when my whole outfit is thrifted. plus a\u003cbr\u003ethrifted wardrobe is hard to make feel cohesive and complete, i\u003cbr\u003ealways feel slightly messy. i just bought four viscose maxi\u003cbr\u003edresses and four cotton long sleeve tops for $89 and i love them\u003cbr\u003eand wear them every day, i have a minimal capsule wardrobe and\u003cbr\u003ewill wear these pieces until they fall apart. i think a lot of\u003cbr\u003epeople who look down on fast fashion are in positions of\u003cbr\u003eprivilege and have extra income to allocate towards fashion. i\u003cbr\u003eshop as responsibly as i can afford to and i am minimal in my\u003cbr\u003epurchases. i also hand wash all of my clothing to extend their\u003cbr\u003elives. just another perspective \u003cemoji\u003e",29,651,0.04339952387563173,1.2333650284757636,0.2577991535053438,83.61904761904762,0.030781373322386965,0.8888713496458355,19.462365591397848,92,0.04802942483057883],["\ud83d\udde3\ufe0f chinese are doing the right thing!\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i am chinese and\u003cbr\u003ewell informed in this matter. for the western audiences who are\u003cbr\u003efrequently watching media like this one. i am sure they are not\u003cbr\u003ewell informed.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the chinese populace has spoken.",41,421,-2.5559600459621663,1.3498401451829947,0.33784555347822715,24.80997624703088,0.015060240963262314,0.6590909090948667,8.67458432304038,55,-0.009422369474822062],["\ud83d\udde3\ufe0f shein is so bad that i bought one item from them and swore\u003cbr\u003ethem off completely! \u003cemoji\u003e to me, they are worse than\u003cbr\u003etemu.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f it\u2019s the same with temu\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i'm glad i've\u003cbr\u003enever bought from shein or temu.",34,157,0.31245414708017644,1.6000437214580299,0.41385593338703414,26.636942675159236,0.02159468438529046,0.7317275747551584,7.6687898089171975,22,0.02010365765667155],["\ud83d\udde3\ufe0f this is all about cotton business competition as us has got\u003cbr\u003etheir \"supima\" cotton, maybe they want to get rid of xinjiang\u003cbr\u003ecotton to force their supima cotton into h&m and\u003cbr\u003eetc....\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f h&m cannot afford cotton from\u003cbr\u003exinjiang.....\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the reality is that xinjiang cotton is\u003cbr\u003every good, the price is also expensive. h & m's clothes are\u003cbr\u003echeap, it is impossible to use xinjiang cotton.",17,213,0.2999830805182421,1.9999513896078704,0.3655867168746513,44.985915492957744,0.023251231526693228,0.9150738916275296,23.826291079812208,47,-0.011231221886289378],["\ud83d\udde3\ufe0f what are people in western countries supposed to do about any\u003cbr\u003eof this?\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f this is beyond sad and the fact is, the west\u003cbr\u003eare exploiting these people because of their situation.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f\u003cbr\u003ewhere is middle eastern countries and america? hypocrisy at it's\u003cbr\u003ebest!",30,636,1.2745611822308907,2.4276688622679417,0.35520487304595877,58.15723270440252,0.006365565322575004,0.8425785591610592,15.56132075471698,82,-0.026838011816128972],["\ud83d\udde3\ufe0f i worked a factory job once. temp agency for low income\u003cbr\u003epeople. we were in a hot warehouse with an assembly line, packed\u003cbr\u003eside by side putting budweiser bottles full of cobwebs from one\u003cbr\u003eout of date box into a new box (they were empty base bottles and\u003cbr\u003ewould be boiled before product went into them) but it was\u003cbr\u003econstant. and full time. we got one lunch break. it was horrible.\u003cbr\u003eand in america. i was 16 and a drop out. only reason i got in was\u003cbr\u003ecause my mother worked one too\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i worked 21 days in a\u003cbr\u003erow at 12 hours a day in the food industry.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i worked\u003cbr\u003ewhen i am little but it was my choice due to financial issue.",36,425,0.9351576787096106,2.809363023769386,0.29978696452070247,76.88,0.02709332144031748,0.8599620916498308,21.103529411764708,69,0.019567143961506522],["\ud83d\udde3\ufe0f but h&m\u2019s clothes aren\u2019t even expensive so i wouldn\u2019t mind\u003cbr\u003espend money on it and h&m is my favorite brand because their\u003cbr\u003edesigns are my style so that\u2019s a plus\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f ok,... i not buy\u003cbr\u003eh&m.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f well to be honest, h&m is shit quality. haven't\u003cbr\u003ebought from them in a few years.",19,415,3.134623024330404,3.04215251359584,0.4494369048592971,42.436144578313254,0.005081300812683268,0.8211382113842292,9.48433734939759,38,-0.0233505473769136],["\ud83d\udde3\ufe0f this makes me sick. i will never buy another nike product.\u003cbr\u003ethey should be ashamed.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f nike is a great company they\u003cbr\u003edont have to be done like this\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f this was known a long\u003cbr\u003etime ago. i haven't bought a nike product since the 80s. please\u003cbr\u003eboycott.",24,509,1.9809574675445747,3.8572778682832847,0.4491703674789108,29.483300589390964,0.010465436518742662,0.6857614982122225,7.133595284872299,50,-0.030764018507642182],["\ud83d\udde3\ufe0f always love his \u2018um, um...yah, yah...uh-huh, uh-\u003cbr\u003ehuh[pause]...mmm, mmm... he\u2019s made a career out of simple\u003cbr\u003ereactions...brilliant!\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the \u201cno it\u2019s not.\u201d stutter takes\u003cbr\u003eme out everytime. he genuinely looked so concerned and disturbed\u003cbr\u003eat the same time.. \u003cemoji\u003e this is comedy gold. the acting is so\u003cbr\u003eon point.!!\ufe0f \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f when the video started, i thought\u003cbr\u003ethe narrator was doing a cliche fashion designer\u2019s voice...but as\u003cbr\u003ethe video went on it\u2019s just him...sounding bored.",43,824,-1.8412556944812237,4.344150604484635,0.11477907519483514,120.94781553398059,0.005072119194745358,0.6129339039491568,7.656553398058253,60,-0.02956006987865044],["\ud83d\udde3\ufe0f apparently working is forced labour...\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f that's an\u003cbr\u003eawful workplace! i feel bad for the workers who have no choice\u003cbr\u003ebut to work in sweatshops to make enough money to live. there\u003cbr\u003eneeds to be more access to good jobs and regulations on fair\u003cbr\u003eemployee wages. not buying from shein anymore. i hope those\u003cbr\u003eworkers can find good jobs\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i feel like the workers are\u003cbr\u003etrying to detour buyers so shein goes bankrupt or smth so they\u003cbr\u003ecan be free. sweatshops have horrid living conditions after all",31,510,4.900624557989483,4.677886176345103,0.4927876193142569,42.811764705882354,0.01201501877323599,0.7949937421804222,7.833333333333333,82,-0.0023835298179181244],["\ud83d\udde3\ufe0f what about child labour in other countries?\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f in most\u003cbr\u003eof the countries child labor is linked to poverty or lack of\u003cbr\u003efinancial stability. it's a shame that even in the 21st century,\u003cbr\u003emany of our children in different parts of the world undergo a\u003cbr\u003emiserable life. exploitation of our children continue in\u003cbr\u003edifferent forms. it is high time to abolish child labor in any\u003cbr\u003eforms by ensuring their rights to live a dignified life. good\u003cbr\u003edocumentary. \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f there is nothing wrong with\u003cbr\u003echildren working. the sooner they start the faster they will want\u003cbr\u003eto succeed in life. they should be paid a fair wage those.",11,590,0.6218768691742977,4.715093661015421,0.4245386991097387,24.801694915254238,0.02335952431507321,0.6706307071594073,7.98135593220339,61,-0.03005669980793642],["\ud83d\udde3\ufe0f all these brands discriminate against chinese while wishing to\u003cbr\u003econtinue to feed on their money. it makes more sense to simply\u003cbr\u003eclose all their shops and no longer sell to any\u003cbr\u003echinese.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f chinese around the world should boycott those\u003cbr\u003ebrands and products. from indonesia\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i don't know why\u003cbr\u003echinese public so in love with foreign brands when foreigners\u003cbr\u003ealways look down on chinese brands and have actively call for a\u003cbr\u003eboycott chinese made products. they should be proud of chinese\u003cbr\u003emade products. most of the foreign brands are made in china, and\u003cbr\u003ein many cases just slap on their foreign labels on chinese made\u003cbr\u003eproducts and then hike up a hefty prices margin because they are\u003cbr\u003eus or western names. just buy chinese brands, same top quality at\u003cbr\u003ea much more reasonable prices.",2,395,0.8399408328790486,4.910710325838017,0.43161178338341416,24.835443037974684,0.01489226869434212,0.6603295310561754,7.989873417721519,67,-0.009320635412534303],["\ud83d\udde3\ufe0f \u003cemoji\u003e he got that ptsd \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f 5:30 \u003cemoji\u003e that\u003cbr\u003ewas \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f her reaction the whole time got me \u003cemoji\u003e",8,526,6.201091604588484,4.911018670114399,0.12304933226440268,199.40114068441065,0.1053062896943169,0.5820528580229248,9.279467680608365,48,0.010683008236442745],["\ud83d\udde3\ufe0f boycott?let chinese tell you what is boycott,look the stock\u003cbr\u003eprice of these brands going where.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f well done boycott\u003cbr\u003echinese products\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f not only boycott but sue them for\u003cbr\u003espreading lies. and start using chinese brands. china does not\u003cbr\u003eneed foreign brands that insult the chinese in their own country\u003cbr\u003eand yet want their money. no person with any self-respect will\u003cbr\u003eaccept that...!",39,237,6.543551735701976,5.167235173149554,0.6310032529202348,15.68776371308017,0.010928961748111456,0.6803278688571827,4.632911392405063,30,-0.014227198642761382],["\ud83d\udde3\ufe0f who is still shopping from shein? their clothes are complete\u003cbr\u003egarbage and not even actually worth paying $1. i partake in fast\u003cbr\u003efashion, but i only buy if i think it will last a year. shein\u003cbr\u003emight as well be disposable clothing\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f there is no second\u003cbr\u003ehand market for shein clothing. it falls apart quickly, it\u003cbr\u003ebecomes ugly quickly, and most goodwills are so fully stocked\u003cbr\u003ewith thousands of shein pieces nowadays, most of them are\u003cbr\u003erefusing shein pieces now. so these clothes end up in the\u003cbr\u003etrash.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i only bought from shein one time because i was\u003cbr\u003edrawn in by the cheap prices. i will never do it again. i ended\u003cbr\u003eup donating everything i got because it fit so bad and i am\u003cbr\u003esomeone who never has problems with fit. i'm not surprised to\u003cbr\u003efind this out about shein. this is why i am willing to pay more\u003cbr\u003emoney for higher quality and sustainable clothing. i wear my\u003cbr\u003eclothes for a few years and will even resell them if they are\u003cbr\u003estill in good condition after that so i don't mind paying up for\u003cbr\u003eclothes.",4,416,5.263038396379961,6.030215268377777,0.5042977173557469,43.93990384615385,0.013415038091761384,0.8420006624718965,14.514423076923077,71,0.05607220301832268],["\ud83d\udde3\ufe0f i\u2019ll never buy a perfume like that again...these kinds of\u003cbr\u003eluxury items are not worth it if they are produced at the expense\u003cbr\u003eof children. most perfumes smell like shit anyway and are\u003cbr\u003ecompletely overpriced. i rather learn how to do it myself and\u003cbr\u003ejoin an organization that campaigns for jobs and fair pay in\u003cbr\u003ethird world countries. thank you for showing us the\u003cbr\u003etruth!\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f stop buying perfumes from such exploitative\u003cbr\u003ebrands.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f another reason to boycott all best selling\u003cbr\u003eperfumes",10,219,6.103378727473638,6.649263693213575,0.5290004904552036,51.10958904109589,0.008474576271124273,0.7707404103497284,10.237442922374429,23,-0.0138463857227433],["\ud83d\udde3\ufe0f lmao people wearing clothes up to 7 times and then throw it\u003cbr\u003eaway. i have clothes from high-school i still wear often it's\u003cbr\u003eprobably half my wardrobe and i'm nearly thirty \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f\u003cbr\u003ethe clothes i wear, get used all the time, things that get dirty\u003cbr\u003eand stained become my work clothes, i don\u2019t understand why people\u003cbr\u003ebuy so many clothes only to wear them once and then throw them\u003cbr\u003eout\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i don\u2019t understand why people would throw their\u003cbr\u003eclothing away so fast. why does it matter if you wear something\u003cbr\u003emultiple times? even tho my family was in a good situation\u003cbr\u003efinancially, i always wore clothes that i had gotten from like\u003cbr\u003eten years ago. still to this day i wear clothes that i might have\u003cbr\u003epurchased years ago. if it fits, then it\u2019s still good. if a part\u003cbr\u003eof it is ripped, then i just stitch it up and continue to wear\u003cbr\u003eit. and when finally my clothes would become too small, my mom\u003cbr\u003ewould tear them up and use them as cloth for cleaning the house\u003cbr\u003eor smth. we also donate them to other kids when they don\u2019t fit me\u003cbr\u003eanymore. tbh, i tend to grow attached to my clothes so i never\u003cbr\u003edare throw them away lol.",47,441,4.29111451474174,7.258468293217776,0.22738460060172078,140.51020408163265,0.03152668597424284,0.741911460488916,27.403628117913833,56,0.021537538166843],["\ud83d\udde3\ufe0f for me myself, i don\u2019t buy shein, but i do buy forever 21. but\u003cbr\u003ei don\u2019t follow fashion trends. i have an alt clothing style. so,\u003cbr\u003ethat means that even thought i do shop at forever 21, h&m, hot\u003cbr\u003etopic, etc, i don\u2019t get rid of my clothes as soon as they\u2019re out\u003cbr\u003eof style. because i don\u2019t follow normal fashion trends, i\u2019ve had\u003cbr\u003elots of the same clothes for years and years, and i resuse them,\u003cbr\u003ewash them, and make new outfits. i really hate how people think\u003cbr\u003eto be glamorous, you have to have different outfits every day.\u003cbr\u003eyou dont ^^ reuse shirts and pants to make new different\u003cbr\u003ecombinations. reuse jewelry to make even better jewelry matching.\u003cbr\u003eand most important, wear what you want to wear. don\u2019t follow\u003cbr\u003efashion trends if you don\u2019t want to. wear what makes you feel\u003cbr\u003ecomfortable, and if people hate you for wearing pieces of fabric\u003cbr\u003ethat\u2019s different from theirs, who cares! it\u2019s your body, your\u003cbr\u003edecision \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f as someone who works in the fashion\u003cbr\u003eindustry it is a challenge to appear on trend, yet having a heart\u003cbr\u003ethat says i don\u2019t need new clothes. i have a closet full of\u003cbr\u003eclothes that are beautiful, good quality, fit well but i still\u003cbr\u003ehave trouble wearing the same outfits over and over. normalize\u003cbr\u003erepeating outfits!!\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f guys, we need to normalise re-\u003cbr\u003ewearing clothes and outfit repeating. it is literally the only\u003cbr\u003eway to solve all the problems that fast fashion perpetuate\u003cbr\u003e(overconsumption and needless waste, pollution, shitty quality\u003cbr\u003eclothes, sweatshops). i know we all like the dopamine hit we get\u003cbr\u003ewhen we buy new things (especially when it's a bargain). i know\u003cbr\u003ewe like it when people compliment us when we are wearing\u003cbr\u003esomething new and pretty. but seriously, living this way is\u003cbr\u003edestroying our environment and promoting the exploitation of\u003cbr\u003epeople (mostly women and children) in developing countries. so\u003cbr\u003eguys, wherever possible, buy secondhand. and if you must buy\u003cbr\u003ebrand new, cherish the item! look after it, wear it multiple\u003cbr\u003etimes until it gets holes, then stitch up the holes and wear the\u003cbr\u003eitem multiple more times!",13,387,5.959494062515998,7.999274088723479,0.1522029963657693,188.75710594315245,0.04057828158348436,0.8219155577464909,31.45736434108527,49,0.02832892288640058],["\ud83d\udde3\ufe0f this is why we need government regulation. when humans are\u003cbr\u003eleft to their own vices you get stuff like this. when ppl and\u003cbr\u003ecompanies get so much money they\u2019ll start to not care about the\u003cbr\u003econditions for their workers and eventually the quality of their\u003cbr\u003eproducts.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f govt should file a complaint against such\u003cbr\u003ecompanies who are designed, manufactured & selling.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the\u003cbr\u003esheer greediness of this company astounds me.... quality and safe\u003cbr\u003eworking conditions are so much more important than mass\u003cbr\u003eproduction",45,549,8.975711795847795,9.27561575498198,0.5726426556639209,52.978142076502735,0.006537421099856107,0.7500000000032004,8.080145719489982,82,0.012796722407302123],["\ud83d\udde3\ufe0f the shameful thing is that the clothing sold by the major high\u003cbr\u003estreet brands and many of the top labels too, arent manufactured\u003cbr\u003eunder significantly superior working conditions. the clothes\u003cbr\u003emaybe better quality but the working conditions, pay, safety and\u003cbr\u003ejob security are often just as bad.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f no ofense but where\u003cbr\u003ei come from even high price brands that are not considered fast\u003cbr\u003efashion and are only affordable for rich ppl have slave labour.\u003cbr\u003eand clandestine factories where they produce their clothes and\u003cbr\u003epay their workers (who work in terrible conditions) barely\u003cbr\u003enothing (like 10 cents for piece of clothing) while they earn\u003cbr\u003emillions per year. ofc we should always put an eye and smell smt\u003cbr\u003efishy when we see a super low price item of clothing but that\u003cbr\u003edoesn't always mean expensive clothing comes from a different\u003cbr\u003eplace. more expensive is not equal as sustainable. sometimes the\u003cbr\u003eclothes can be made in different conditions but the fabric comes\u003cbr\u003efrom the same place. the threads. and the quality is almost the\u003cbr\u003esame. a way you can help the planet and avoid this whole mess as\u003cbr\u003emuch as you can is to buy second-hand clothes, take care of your\u003cbr\u003eclothes, learn how to fix them if they break o they need some\u003cbr\u003eadjustments instead of throwing the item into the trash, and\u003cbr\u003efinally support local businesses. small creators who work their\u003cbr\u003easses off to make a t shirt and print it. sew everything\u003cbr\u003ethemselves or their group. pay the price they put out there.\u003cbr\u003ethreat them with respect. take them seriously. help them live\u003cbr\u003etheir lives working and getting a proper salary. help you find\u003cbr\u003enice pieces of clothing that will last years.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the main\u003cbr\u003eissue is that most clothing is unethically sourced these days and\u003cbr\u003ewith the economy becoming worse by the day, people got no choice\u003cbr\u003ebut to buy cheap products with what little money they have. even\u003cbr\u003ethrift stores are not what they used to be in some countries.",21,502,8.386816252634004,9.65178565489932,0.5011641472314606,75.90836653386454,0.013950617283455568,0.8703703703716896,16.13545816733068,88,0.011459756223109876],["\ud83d\udde3\ufe0f it's not slavery, if a person is ok with that.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f jobs\u003cbr\u003eare also slavery! you should consider that fact as\u003cbr\u003ewell.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f it may not be chattel slavery, but it is\u003cbr\u003edefinitely still slavery",18,449,6.976101658566135,9.712548799365457,0.5929763904149916,26.957683741648108,0.013058419243787268,0.6522336769789047,6.481069042316259,49,-0.01974348539177259],["\ud83d\udde3\ufe0f never heard of shein but i will happily continue not\u003cbr\u003epurchasing their products\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i never even heard of shein\u003cbr\u003euntil now.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i never knew about shein until after seeing\u003cbr\u003ehow horrible of a company it is",48,495,11.912035013052469,12.607482138718302,0.5552841017911718,91.81616161616162,0.025118875335776076,0.8457721728355907,19.543434343434342,69,0.06639365936274443],["\ud83d\udde3\ufe0f one of the problems with fast fashion is that it isn\u2019t a good\u003cbr\u003ething if people stop buying it. the people making those clothes\u003cbr\u003emake them because they can\u2019t get a better job. and if everyone\u003cbr\u003estops buying fast fashion, those people will lose their job. of\u003cbr\u003ecourse they are not paid enough to make the clothes and the\u003cbr\u003eamount they work is inhumane, but if they lose their job, they\u003cbr\u003ewill have no money at all. these problems never have an easy\u003cbr\u003esolution.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i really think the biggest problem with fast\u003cbr\u003efashion is buying many pieces of clothing in just one month.\u003cbr\u003esadly even many eco friendly brands rely on monthly collections\u003cbr\u003eto drive their sales. so to me this is a welcome shift in\u003cbr\u003eculture.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f fast fashion is the most consumerist and dumb\u003cbr\u003emovement, it's toxic for workers, environment, resources and your\u003cbr\u003eown wallet!!! i recommend to buy high-quality non-fashionable\u003cbr\u003eclothings, timeless ones that are made to last years and wear out\u003cbr\u003egracefully.",38,342,11.778052155771872,13.732531631184033,0.34670510960263556,179.08187134502924,0.012214926216036823,0.8504554119894556,41.41228070175438,46,0.022018024667084364],["\ud83d\ud
