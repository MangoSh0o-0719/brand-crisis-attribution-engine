 products. from indonesia\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i don't know why\u003cbr\u003echinese public so in love with foreign brands when foreigners\u003cbr\u003ealways look down on chinese brands and have actively call for a\u003cbr\u003eboycott chinese made products. they should be proud of chinese\u003cbr\u003emade products. most of the foreign brands are made in china, and\u003cbr\u003ein many cases just slap on their foreign labels on chinese made\u003cbr\u003eproducts and then hike up a hefty prices margin because they are\u003cbr\u003eus or western names. just buy chinese brands, same top quality at\u003cbr\u003ea much more reasonable prices.",2,395,0.8399408328790486,4.910710325838017,0.43161178338341416,24.835443037974684,0.6603295310561754,7.989873417721519,67,-0.009320635412534303,0.07405136351269787],["\ud83d\udde3\ufe0f \u003cemoji\u003e he got that ptsd \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f 5:30 \u003cemoji\u003e that\u003cbr\u003ewas \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f her reaction the whole time got me \u003cemoji\u003e",8,526,6.201091604588484,4.911018670114399,0.12304933226440268,199.40114068441065,0.5820528580229248,9.279467680608365,48,0.010683008236442745,0.05038581410323936],["\ud83d\udde3\ufe0f boycott?let chinese tell you what is boycott,look the stock\u003cbr\u003eprice of these brands going where.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f well done boycott\u003cbr\u003echinese products\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f not only boycott but sue them for\u003cbr\u003espreading lies. and start using chinese brands. china does not\u003cbr\u003eneed foreign brands that insult the chinese in their own country\u003cbr\u003eand yet want their money. no person with any self-respect will\u003cbr\u003eaccept that...!",39,237,6.543551735701976,5.167235173149554,0.6310032529202348,15.68776371308017,0.6803278688571827,4.632911392405063,30,-0.014227198642761382,0.027409649556729553],["\ud83d\udde3\ufe0f who is still shopping from shein? their clothes are complete\u003cbr\u003egarbage and not even actually worth paying $1. i partake in fast\u003cbr\u003efashion, but i only buy if i think it will last a year. shein\u003cbr\u003emight as well be disposable clothing\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f there is no second\u003cbr\u003ehand market for shein clothing. it falls apart quickly, it\u003cbr\u003ebecomes ugly quickly, and most goodwills are so fully stocked\u003cbr\u003ewith thousands of shein pieces nowadays, most of them are\u003cbr\u003erefusing shein pieces now. so these clothes end up in the\u003cbr\u003etrash.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i only bought from shein one time because i was\u003cbr\u003edrawn in by the cheap prices. i will never do it again. i ended\u003cbr\u003eup donating everything i got because it fit so bad and i am\u003cbr\u003esomeone who never has problems with fit. i'm not surprised to\u003cbr\u003efind this out about shein. this is why i am willing to pay more\u003cbr\u003emoney for higher quality and sustainable clothing. i wear my\u003cbr\u003eclothes for a few years and will even resell them if they are\u003cbr\u003estill in good condition after that so i don't mind paying up for\u003cbr\u003eclothes.",4,416,5.263038396379961,6.030215268377777,0.5042977173557469,43.93990384615385,0.8420006624718965,14.514423076923077,71,0.05607220301832268,0.010248702501540762],["\ud83d\udde3\ufe0f i\u2019ll never buy a perfume like that again...these kinds of\u003cbr\u003eluxury items are not worth it if they are produced at the expense\u003cbr\u003eof children. most perfumes smell like shit anyway and are\u003cbr\u003ecompletely overpriced. i rather learn how to do it myself and\u003cbr\u003ejoin an organization that campaigns for jobs and fair pay in\u003cbr\u003ethird world countries. thank you for showing us the\u003cbr\u003etruth!\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f stop buying perfumes from such exploitative\u003cbr\u003ebrands.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f another reason to boycott all best selling\u003cbr\u003eperfumes",10,219,6.103378727473638,6.649263693213575,0.5290004904552036,51.10958904109589,0.7707404103497284,10.237442922374429,23,-0.0138463857227433,0.024222931232485048],["\ud83d\udde3\ufe0f lmao people wearing clothes up to 7 times and then throw it\u003cbr\u003eaway. i have clothes from high-school i still wear often it's\u003cbr\u003eprobably half my wardrobe and i'm nearly thirty \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f\u003cbr\u003ethe clothes i wear, get used all the time, things that get dirty\u003cbr\u003eand stained become my work clothes, i don\u2019t understand why people\u003cbr\u003ebuy so many clothes only to wear them once and then throw them\u003cbr\u003eout\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i don\u2019t understand why people would throw their\u003cbr\u003eclothing away so fast. why does it matter if you wear something\u003cbr\u003emultiple times? even tho my family was in a good situation\u003cbr\u003efinancially, i always wore clothes that i had gotten from like\u003cbr\u003eten years ago. still to this day i wear clothes that i might have\u003cbr\u003epurchased years ago. if it fits, then it\u2019s still good. if a part\u003cbr\u003eof it is ripped, then i just stitch it up and continue to wear\u003cbr\u003eit. and when finally my clothes would become too small, my mom\u003cbr\u003ewould tear them up and use them as cloth for cleaning the house\u003cbr\u003eor smth. we also donate them to other kids when they don\u2019t fit me\u003cbr\u003eanymore. tbh, i tend to grow attached to my clothes so i never\u003cbr\u003edare throw them away lol.",47,441,4.29111451474174,7.258468293217776,0.22738460060172078,140.51020408163265,0.741911460488916,27.403628117913833,56,0.021537538166843,0.04790532544392141],["\ud83d\udde3\ufe0f for me myself, i don\u2019t buy shein, but i do buy forever 21. but\u003cbr\u003ei don\u2019t follow fashion trends. i have an alt clothing style. so,\u003cbr\u003ethat means that even thought i do shop at forever 21, h&m, hot\u003cbr\u003etopic, etc, i don\u2019t get rid of my clothes as soon as they\u2019re out\u003cbr\u003eof style. because i don\u2019t follow normal fashion trends, i\u2019ve had\u003cbr\u003elots of the same clothes for years and years, and i resuse them,\u003cbr\u003ewash them, and make new outfits. i really hate how people think\u003cbr\u003eto be glamorous, you have to have different outfits every day.\u003cbr\u003eyou dont ^^ reuse shirts and pants to make new different\u003cbr\u003ecombinations. reuse jewelry to make even better jewelry matching.\u003cbr\u003eand most important, wear what you want to wear. don\u2019t follow\u003cbr\u003efashion trends if you don\u2019t want to. wear what makes you feel\u003cbr\u003ecomfortable, and if people hate you for wearing pieces of fabric\u003cbr\u003ethat\u2019s different from theirs, who cares! it\u2019s your body, your\u003cbr\u003edecision \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f as someone who works in the fashion\u003cbr\u003eindustry it is a challenge to appear on trend, yet having a heart\u003cbr\u003ethat says i don\u2019t need new clothes. i have a closet full of\u003cbr\u003eclothes that are beautiful, good quality, fit well but i still\u003cbr\u003ehave trouble wearing the same outfits over and over. normalize\u003cbr\u003erepeating outfits!!\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f guys, we need to normalise re-\u003cbr\u003ewearing clothes and outfit repeating. it is literally the only\u003cbr\u003eway to solve all the problems that fast fashion perpetuate\u003cbr\u003e(overconsumption and needless waste, pollution, shitty quality\u003cbr\u003eclothes, sweatshops). i know we all like the dopamine hit we get\u003cbr\u003ewhen we buy new things (especially when it's a bargain). i know\u003cbr\u003ewe like it when people compliment us when we are wearing\u003cbr\u003esomething new and pretty. but seriously, living this way is\u003cbr\u003edestroying our environment and promoting the exploitation of\u003cbr\u003epeople (mostly women and children) in developing countries. so\u003cbr\u003eguys, wherever possible, buy secondhand. and if you must buy\u003cbr\u003ebrand new, cherish the item! look after it, wear it multiple\u003cbr\u003etimes until it gets holes, then stitch up the holes and wear the\u003cbr\u003eitem multiple more times!",13,387,5.959494062515998,7.999274088723479,0.1522029963657693,188.75710594315245,0.8219155577464909,31.45736434108527,49,0.02832892288640058,0.02429896657961494],["\ud83d\udde3\ufe0f this is why we need government regulation. when humans are\u003cbr\u003eleft to their own vices you get stuff like this. when ppl and\u003cbr\u003ecompanies get so much money they\u2019ll start to not care about the\u003cbr\u003econditions for their workers and eventually the quality of their\u003cbr\u003eproducts.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f govt should file a complaint against such\u003cbr\u003ecompanies who are designed, manufactured & selling.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the\u003cbr\u003esheer greediness of this company astounds me.... quality and safe\u003cbr\u003eworking conditions are so much more important than mass\u003cbr\u003eproduction",45,549,8.975711795847795,9.27561575498198,0.5726426556639209,52.978142076502735,0.7500000000032004,8.080145719489982,82,0.012796722407302123,0.026192409160294004],["\ud83d\udde3\ufe0f the shameful thing is that the clothing sold by the major high\u003cbr\u003estreet brands and many of the top labels too, arent manufactured\u003cbr\u003eunder significantly superior working conditions. the clothes\u003cbr\u003emaybe better quality but the working conditions, pay, safety and\u003cbr\u003ejob security are often just as bad.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f no ofense but where\u003cbr\u003ei come from even high price brands that are not considered fast\u003cbr\u003efashion and are only affordable for rich ppl have slave labour.\u003cbr\u003eand clandestine factories where they produce their clothes and\u003cbr\u003epay their workers (who work in terrible conditions) barely\u003cbr\u003enothing (like 10 cents for piece of clothing) while they earn\u003cbr\u003emillions per year. ofc we should always put an eye and smell smt\u003cbr\u003efishy when we see a super low price item of clothing but that\u003cbr\u003edoesn't always mean expensive clothing comes from a different\u003cbr\u003eplace. more expensive is not equal as sustainable. sometimes the\u003cbr\u003eclothes can be made in different conditions but the fabric comes\u003cbr\u003efrom the same place. the threads. and the quality is almost the\u003cbr\u003esame. a way you can help the planet and avoid this whole mess as\u003cbr\u003emuch as you can is to buy second-hand clothes, take care of your\u003cbr\u003eclothes, learn how to fix them if they break o they need some\u003cbr\u003eadjustments instead of throwing the item into the trash, and\u003cbr\u003efinally support local businesses. small creators who work their\u003cbr\u003easses off to make a t shirt and print it. sew everything\u003cbr\u003ethemselves or their group. pay the price they put out there.\u003cbr\u003ethreat them with respect. take them seriously. help them live\u003cbr\u003etheir lives working and getting a proper salary. help you find\u003cbr\u003enice pieces of clothing that will last years.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the main\u003cbr\u003eissue is that most clothing is unethically sourced these days and\u003cbr\u003ewith the economy becoming worse by the day, people got no choice\u003cbr\u003ebut to buy cheap products with what little money they have. even\u003cbr\u003ethrift stores are not what they used to be in some countries.",21,502,8.386816252634004,9.65178565489932,0
