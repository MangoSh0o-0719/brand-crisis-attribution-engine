    <div>                        <script type="text/javascript">window.PlotlyConfig = {MathJaxConfig: 'local'};</script>
        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.3.1.min.js" integrity="sha256-4rD3fugVb/nVJYUv5Ky3v+fYXoouHaBSP20WIJuEiWg=" crossorigin="anonymous"></script>                <div id="bd6d1e9e-a489-4ff5-9d4e-cbc068f11023" class="plotly-graph-div" style="height:700px; width:100%;"></div>            <script type="text/javascript">                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("bd6d1e9e-a489-4ff5-9d4e-cbc068f11023")) {                    Plotly.newPlot(                        "bd6d1e9e-a489-4ff5-9d4e-cbc068f11023",                        [{"customdata":[["\ud83d\udde3\ufe0f \u003cemoji\u003e he got that ptsd \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f 5:30 \u003cemoji\u003e that\u003cbr\u003ewas \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f her reaction the whole time got me \u003cemoji\u003e",8,526],["\ud83d\udde3\ufe0f the shameful thing is that the clothing sold by the major high\u003cbr\u003estreet brands and many of the top labels too, arent manufactured\u003cbr\u003eunder significantly superior working conditions. the clothes\u003cbr\u003emaybe better quality but the working conditions, pay, safety and\u003cbr\u003ejob security are often just as bad.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f no ofense but where\u003cbr\u003ei come from even high price brands that are not considered fast\u003cbr\u003efashion and are only affordable for rich ppl have slave labour.\u003cbr\u003eand clandestine factories where they produce their clothes and\u003cbr\u003epay their workers (who work in terrible conditions) barely\u003cbr\u003enothing (like 10 cents for piece of clothing) while they earn\u003cbr\u003emillions per year. ofc we should always put an eye and smell smt\u003cbr\u003efishy when we see a super low price item of clothing but that\u003cbr\u003edoesn't always mean expensive clothing comes from a different\u003cbr\u003eplace. more expensive is not equal as sustainable. sometimes the\u003cbr\u003eclothes can be made in different conditions but the fabric comes\u003cbr\u003efrom the same place. the threads. and the quality is almost the\u003cbr\u003esame. a way you can help the planet and avoid this whole mess as\u003cbr\u003emuch as you can is to buy second-hand clothes, take care of your\u003cbr\u003eclothes, learn how to fix them if they break o they need some\u003cbr\u003eadjustments instead of throwing the item into the trash, and\u003cbr\u003efinally support local businesses. small creators who work their\u003cbr\u003easses off to make a t shirt and print it. sew everything\u003cbr\u003ethemselves or their group. pay the price they put out there.\u003cbr\u003ethreat them with respect. take them seriously. help them live\u003cbr\u003etheir lives working and getting a proper salary. help you find\u003cbr\u003enice pieces of clothing that will last years.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the main\u003cbr\u003eissue is that most clothing is unethically sourced these days and\u003cbr\u003ewith the economy becoming worse by the day, people got no choice\u003cbr\u003ebut to buy cheap products with what little money they have. even\u003cbr\u003ethrift stores are not what they used to be in some countries.",21,502],["\ud83d\udde3\ufe0f this is why we need government regulation. when humans are\u003cbr\u003eleft to their own vices you get stuff like this. when ppl and\u003cbr\u003ecompanies get so much money they\u2019ll start to not care about the\u003cbr\u003econditions for their workers and eventually the quality of their\u003cbr\u003eproducts.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f govt should file a complaint against such\u003cbr\u003ecompanies who are designed, manufactured & selling.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the\u003cbr\u003esheer greediness of this company astounds me.... quality and safe\u003cbr\u003eworking conditions are so much more important than mass\u003cbr\u003eproduction",45,549],["\ud83d\udde3\ufe0f i worked a factory job once. temp agency for low income\u003cbr\u003epeople. we were in a hot warehouse with an assembly line, packed\u003cbr\u003eside by side putting budweiser bottles full of cobwebs from one\u003cbr\u003eout of date box into a new box (they were empty base bottles and\u003cbr\u003ewould be boiled before product went into them) but it was\u003cbr\u003econstant. and full time. we got one lunch break. it was horrible.\u003cbr\u003eand in america. i was 16 and a drop out. only reason i got in was\u003cbr\u003ecause my mother worked one too\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i worked 21 days in a\u003cbr\u003erow at 12 hours a day in the food industry.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i worked\u003cbr\u003ewhen i am little but it was my choice due to financial issue.",36,425],["\ud83d\udde3\ufe0f shein is so bad that i bought one item from them and swore\u003cbr\u003ethem off completely! \u003cemoji\u003e to me, they are worse than\u003cbr\u003etemu.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f it\u2019s the same with temu\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i'm glad i've\u003cbr\u003enever bought from shein or temu.",34,157],["\ud83d\udde3\ufe0f lmao people wearing clothes up to 7 times and then throw it\u003cbr\u003eaway. i have clothes from high-school i still wear often it's\u003cbr\u003eprobably half my wardrobe and i'm nearly thirty \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f\u003cbr\u003ethe clothes i wear, get used all the time, things that get dirty\u003cbr\u003eand stained become my work clothes, i don\u2019t understand why people\u003cbr\u003ebuy so many clothes only to wear them once and then throw them\u003cbr\u003eout\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i don\u2019t understand why people would throw their\u003cbr\u003eclothing away so fast. why does it matter if you wear something\u003cbr\u003emultiple times? even tho my family was in a good situation\u003cbr\u003efinancially, i always wore clothes that i had gotten from like\u003cbr\u003eten years ago. still to this day i wear clothes that i might have\u003cbr\u003epurchased years ago. if it fits, then it\u2019s still good. if a part\u003cbr\u003eof it is ripped, then i just stitch it up and continue to wear\u003cbr\u003eit. and when finally my clothes would become too small, my mom\u003cbr\u003ewould tear them up and use them as cloth for cleaning the house\u003cbr\u003eor smth. we also donate them to other kids when they don\u2019t fit me\u003cbr\u003eanymore. tbh, i tend to grow attached to my clothes so i never\u003cbr\u003edare throw them away lol.",47,441],["\ud83d\udde3\ufe0f i only bought from them once, before i found out about\u003cbr\u003eeverything. i was in college and didn't have a ton of money to\u003cbr\u003espend on items i needed. so, i tried shein. i still have those\u003cbr\u003eitems today. never bought from them again, but i can say that it\u003cbr\u003ewas great for people who don't have money.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i will never\u003cbr\u003epurchase from them ! disgusting\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f im no longer buying any\u003cbr\u003eexpensive brands. im buying good quality cheap price.",12,618],["\ud83d\udde3\ufe0f one of the problems with fast fashion is that it isn\u2019t a good\u003cbr\u003ething if people stop buying it. the people making those clothes\u003cbr\u003emake them because they can\u2019t get a better job. and if everyone\u003cbr\u003estops buying fast fashion, those people will lose their job. of\u003cbr\u003ecourse they are not paid enough to make the clothes and the\u003cbr\u003eamount they work is inhumane, but if they lose their job, they\u003cbr\u003ewill have no money at all. these problems never have an easy\u003cbr\u003esolution.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i really think the biggest problem with fast\u003cbr\u003efashion is buying many pieces of clothing in just one month.\u003cbr\u003esadly even many eco friendly brands rely on monthly collections\u003cbr\u003eto drive their sales. so to me this is a welcome shift in\u003cbr\u003eculture.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f fast fashion is the most consumerist and dumb\u003cbr\u003emovement, it's toxic for workers, environment, resources and your\u003cbr\u003eown wallet!!! i recommend to buy high-quality non-fashionable\u003cbr\u003eclothings, timeless ones that are made to last years and wear out\u003cbr\u003egracefully.",38,342],["\ud83d\udde3\ufe0f influencers are still a thing????\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f wow, looks like it\u003cbr\u003edoesnt take much to be an \"influencer\"\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i never listen\u003cbr\u003eto \"influencers\". for me the term \"influencer\" is wrong for these\u003cbr\u003epeople. they are just overpaid and most of the times\u003cbr\u003eunderqualified advertisers",9,192],["\ud83d\udde3\ufe0f 8:58 it\u2019s um.... something bad...\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f 5:12 honestly that\u003cbr\u003eis scary\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f 6:54 and i thought they figured that out years\u003cbr\u003eago",16,459],["\ud83d\udde3\ufe0f i got a shein ad during this video \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i got a\u003cbr\u003eshein ad on this video \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i got a shein ad on this\u003cbr\u003evideo \u003cemoji\u003e",22,214],["\ud83d\udde3\ufe0f for me myself, i don\u2019t buy shein, but i do buy forever 21. but\u003cbr\u003ei don\u2019t follow fashion trends. i have an alt clothing style. so,\u003cbr\u003ethat means that even thought i do shop at forever 21, h&m, hot\u003cbr\u003etopic, etc, i don\u2019t get rid of my clothes as soon as they\u2019re out\u003cbr\u003eof style. because i don\u2019t follow normal fashion trends, i\u2019ve had\u003cbr\u003elots of the same clothes for years and years, and i resuse them,\u003cbr\u003ewash them, and make new outfits. i really hate how people think\u003cbr\u003eto be glamorous, you have to have different outfits every day.\u003cbr\u003eyou dont ^^ reuse shirts and pants to make new different\u003cbr\u003ecombinations. reuse jewelry to make even better jewelry matching.\u003cbr\u003eand most important, wear what you want to wear. don\u2019t follow\u003cbr\u003efashion trends if you don\u2019t want to. wear what makes you feel\u003cbr\u003ecomfortable, and if people hate you for wearing pieces of fabric\u003cbr\u003ethat\u2019s different from theirs, who cares! it\u2019s your body, your\u003cbr\u003edecision \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f as someone who works in the fashion\u003cbr\u003eindustry it is a challenge to appear on trend, yet having a heart\u003cbr\u003ethat says i don\u2019t need new clothes. i have a closet full of\u003cbr\u003eclothes that are beautiful, good quality, fit well but i still\u003cbr\u003ehave trouble wearing the same outfits over and over. normalize\u003cbr\u003erepeating outfits!!\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f guys, we need to normalise re-\u003cbr\u003ewearing clothes and outfit repeating. it is literally the only\u003cbr\u003eway to solve all the problems that fast fashion perpetuate\u003cbr\u003e(overconsumption and needless waste, pollution, shitty quality\u003cbr\u003eclothes, sweatshops). i know we all like the dopamine hit we get\u003cbr\u003ewhen we buy new things (especially when it's a bargain). i know\u003cbr\u003ewe like it when people compliment us when we are wearing\u003cbr\u003esomething new and pretty. but seriously, living this way is\u003cbr\u003edestroying our environment and promoting the exploitation of\u003cbr\u003epeople (mostly women and children) in developing countries. so\u003cbr\u003eguys, wherever possible, buy secondhand. and if you must buy\u003cbr\u003ebrand new, cherish the item! look after it, wear it multiple\u003cbr\u003etimes until it gets holes, then stitch up the holes and wear the\u003cbr\u003eitem multiple more times!",13,387],["\ud83d\udde3\ufe0f i\u2019m southeast asian and even the cheapest shein clothes still\u003cbr\u003equite expensive for me so i\u2019ve never buy one. i rarely buy new\u003cbr\u003eclothes, when i do i bought them from thrifted and will only buy\u003cbr\u003eone if it\u2019s around $3 or under $6 (though in my country,\u003cbr\u003ethrifting has become sooo well known that sellers can charge for\u003cbr\u003emore than $10 for a single used clothes). all those fast fashion\u003cbr\u003ebrand such as h&m, zara, forever21 and uniqlo to me is an\u003cbr\u003eexpensive brand. i only have 1 or 2 clothes with that brand and i\u003cbr\u003etreasure them so much and i use it for special occasions. this is\u003cbr\u003eso sad that those are actually cheap clothes and they throw away\u003cbr\u003ehundred clothes meanwhile in another side of world, there\u2019s\u003cbr\u003esomeone who actually treasure the brand with thoughts it\u2019s an\u003cbr\u003eexpensive brand.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i'm in the sort of weird \"stuck\u003cbr\u003ebetween a rock and a hard place\" clothing sphere. i buy cheap\u003cbr\u003eclothes because that's all i can afford. i am aware of how bad it\u003cbr\u003eis for the people who make it and the environment, however i have\u003cbr\u003eno choice in the matter due to constant financial struggles.\u003cbr\u003ewhile i buy cheap, i also buy seldom. last time i bought clothes\u003cbr\u003ewas 2020. while i participate in what you would call \"fast\u003cbr\u003efashion\" i actually keep my clothes for years and years until\u003cbr\u003ethey cant be publicly presentable anymore, at which point they\u003cbr\u003ebecome at home clothes until they get so damaged that repairing\u003cbr\u003ethem just isn't worth the hassle.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f some people such as\u003cbr\u003emyself shop from shein out of necessity. i have $150 for the\u003cbr\u003ewhole season, not for a couple of pieces. ethical fashion is very\u003cbr\u003eout of reach for me. yes i shop thrift stores but honestly thrift\u003cbr\u003estores are increasing picked through by resellers and i end up\u003cbr\u003efeeling not put together when my whole outfit is thrifted. plus a\u003cbr\u003ethrifted wardrobe is hard to make feel cohesive and complete, i\u003cbr\u003ealways feel slightly messy. i just bought four viscose maxi\u003cbr\u003edresses and four cotton long sleeve tops for $89 and i love them\u003cbr\u003eand wear them every day, i have a minimal capsule wardrobe and\u003cbr\u003ewill wear these pieces until they fall apart. i think a lot of\u003cbr\u003epeople who look down on fast fashion are in positions of\u003cbr\u003eprivilege and have extra income to allocate towards fashion. i\u003cbr\u003eshop as responsibly as i can afford to and i am minimal in my\u003cbr\u003epurchases. i also hand wash all of my clothing to extend their\u003cbr\u003elives. just another perspective \u003cemoji\u003e",29,651],["\ud83d\udde3\ufe0f who is still shopping from shein? their clothes are complete\u003cbr\u003egarbage and not even actually worth paying $1. i partake in fast\u003cbr\u003efashion, but i only buy if i think it will last a year. shein\u003cbr\u003emight as well be disposable clothing\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f there is no second\u003cbr\u003ehand market for shein clothing. it falls apart quickly, it\u003cbr\u003ebecomes ugly quickly, and most goodwills are so fully stocked\u003cbr\u003ewith thousands of shein pieces nowadays, most of them are\u003cbr\u003erefusing shein pieces now. so these clothes end up in the\u003cbr\u003etrash.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i only bought from shein one time because i was\u003cbr\u003edrawn in by the cheap prices. i will never do it again. i ended\u003cbr\u003eup donating everything i got because it fit so bad and i am\u003cbr\u003esomeone who never has problems with fit. i'm not surprised to\u003cbr\u003efind this out about shein. this is why i am willing to pay more\u003cbr\u003emoney for higher quality and sustainable clothing. i wear my\u003cbr\u003eclothes for a few years and will even resell them if they are\u003cbr\u003estill in good condition after that so i don't mind paying up for\u003cbr\u003eclothes.",4,416],["\ud83d\udde3\ufe0f never heard of shein but i will happily continue not\u003cbr\u003epurchasing their products\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i never even heard of shein\u003cbr\u003euntil now.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i never knew about shein until after seeing\u003cbr\u003ehow horrible of a company it is",48,495]],"hovertemplate":"\u003cb\u003e%{hovertext}\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003eLift=%{x:.3f}\u003cbr\u003eExamples=%{customdata[0]}\u003cbr\u003eTopic Volume=%{customdata[2]}\u003cbr\u003eTopic Net Negative=%{marker.color}\u003cextra\u003e\u003c\u002fextra\u003e","hovertext":[" \u003cemoji: He got that ptsd . \u003cemojosh: \"That\u003cbr\u003ewas \u003cem emoji\u003e her reaction the whole time\u003cbr\u003egot me \u003cemmoosh\""," The clothing sold by the major high street\u003cbr\u003ebrands and many of the top labels too, arent\u003cbr\u003emanufactured under significantly superior\u003cbr\u003eworking conditions . The clothes maybe better\u003cbr\u003equality but the working conditions, pay,\u003cbr\u003esafety and job security are often just as bad\u003cbr\u003e. The main issue is that most clothing is un"," When humans are left to their own vices you\u003cbr\u003eget stuff like this. this is why we need\u003cbr\u003egovernment regulation. when ppl and companies\u003cbr\u003eget so much money they\u2019ll start to not care\u003cbr\u003eabout the conditions for their workers and\u003cbr\u003eeventually the quality of th
