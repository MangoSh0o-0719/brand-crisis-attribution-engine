    <div>                        <script type="text/javascript">window.PlotlyConfig = {MathJaxConfig: 'local'};</script>
        <script charset="utf-8" src="https://cdn.plot.ly/plotly-3.3.1.min.js" integrity="sha256-4rD3fugVb/nVJYUv5Ky3v+fYXoouHaBSP20WIJuEiWg=" crossorigin="anonymous"></script>                <div id="185a20eb-8805-4ccd-b355-533b4e4b513e" class="plotly-graph-div" style="height:700px; width:100%;"></div>            <script type="text/javascript">                window.PLOTLYENV=window.PLOTLYENV || {};                                if (document.getElementById("185a20eb-8805-4ccd-b355-533b4e4b513e")) {                    Plotly.newPlot(                        "185a20eb-8805-4ccd-b355-533b4e4b513e",                        [{"customdata":[["\ud83d\udde3\ufe0f \u003cemoji\u003e he got that ptsd \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f 5:30 \u003cemoji\u003e that was \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f her reaction the whole time got me \u003cemoji\u003e",8,526],["\ud83d\udde3\ufe0f the shameful thing is that the clothing sold by the major high street brands and many of the top labels too, arent manufactured under significantly superior working conditions. the clothes maybe better quality but the working conditions, pay, safety and job security are often just as bad.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f no ofense but where i come from even high price brands that are not considered fast fashion and are only affordable for rich ppl have slave labour. and clandestine factories where they produce their clothes and pay their workers (who work in terrible conditions) barely nothing (like 10 cents for piece of clothing) while they earn millions per year. ofc we should always put an eye and smell smt fishy when we see a super low price item of clothing but that doesn't always mean expensive clothing comes from a different place. more expensive is not equal as sustainable. sometimes the clothes can be made in different conditions but the fabric comes from the same place. the threads. and the quality is almost the same. a way you can help the planet and avoid this whole mess as much as you can is to buy second-hand clothes, take care of your clothes, learn how to fix them if they break o they need some adjustments instead of throwing the item into the trash, and finally support local businesses. small creators who work their asses off to make a t shirt and print it. sew everything themselves or their group. pay the price they put out there. threat them with respect. take them seriously. help them live their lives working and getting a proper salary. help you find nice pieces of clothing that will last years.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the main issue is that most clothing is unethically sourced these days and with the economy becoming worse by the day, people got no choice but to buy cheap products with what little money they have. even thrift stores are not what they used to be in some countries.",21,502],["\ud83d\udde3\ufe0f this is why we need government regulation. when humans are left to their own vices you get stuff like this. when ppl and companies get so much money they\u2019ll start to not care about the conditions for their workers and eventually the quality of their products.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f govt should file a complaint against such companies who are designed, manufactured & selling.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the sheer greediness of this company astounds me.... quality and safe working conditions are so much more important than mass production",45,549],["\ud83d\udde3\ufe0f i worked a factory job once. temp agency for low income people. we were in a hot warehouse with an assembly line, packed side by side putting budweiser bottles full of cobwebs from one out of date box into a new box (they were empty base bottles and would be boiled before product went into them) but it was constant. and full time. we got one lunch break. it was horrible. and in america. i was 16 and a drop out. only reason i got in was cause my mother worked one too\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i worked 21 days in a row at 12 hours a day in the food industry.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i worked when i am little but it was my choice due to financial issue.",36,425],["\ud83d\udde3\ufe0f shein is so bad that i bought one item from them and swore them off completely! \u003cemoji\u003e to me, they are worse than temu.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f it\u2019s the same with temu\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i'm glad i've never bought from shein or temu.",34,157],["\ud83d\udde3\ufe0f lmao people wearing clothes up to 7 times and then throw it away. i have clothes from high-school i still wear often it's probably half my wardrobe and i'm nearly thirty \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f the clothes i wear, get used all the time, things that get dirty and stained become my work clothes, i don\u2019t understand why people buy so many clothes only to wear them once and then throw them out\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i don\u2019t understand why people would throw their clothing away so fast. why does it matter if you wear something multiple times? even tho my family was in a good situation financially, i always wore clothes that i had gotten from like ten years ago. still to this day i wear clothes that i might have purchased years ago. if it fits, then it\u2019s still good. if a part of it is ripped, then i just stitch it up and continue to wear it. and when finally my clothes would become too small, my mom would tear them up and use them as cloth for cleaning the house or smth. we also donate them to other kids when they don\u2019t fit me anymore. tbh, i tend to grow attached to my clothes so i never dare throw them away lol.",47,441],["\ud83d\udde3\ufe0f i only bought from them once, before i found out about everything. i was in college and didn't have a ton of money to spend on items i needed. so, i tried shein. i still have those items today. never bought from them again, but i can say that it was great for people who don't have money.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i will never purchase from them ! disgusting\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f im no longer buying any expensive brands. im buying good quality cheap price.",12,618],["\ud83d\udde3\ufe0f one of the problems with fast fashion is that it isn\u2019t a good thing if people stop buying it. the people making those clothes make them because they can\u2019t get a better job. and if everyone stops buying fast fashion, those people will lose their job. of course they are not paid enough to make the clothes and the amount they work is inhumane, but if they lose their job, they will have no money at all. these problems never have an easy solution.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i really think the biggest problem with fast fashion is buying many pieces of clothing in just one month. sadly even many eco friendly brands rely on monthly collections to drive their sales. so to me this is a welcome shift in culture.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f fast fashion is the most consumerist and dumb movement, it's toxic for workers, environment, resources and your own wallet!!! i recommend to buy high-quality non-fashionable clothings, timeless ones that are made to last years and wear out gracefully.",38,342],["\ud83d\udde3\ufe0f influencers are still a thing????\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f wow, looks like it doesnt take much to be an \"influencer\"\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i never listen to \"influencers\". for me the term \"influencer\" is wrong for these people. they are just overpaid and most of the times underqualified advertisers",9,192],["\ud83d\udde3\ufe0f 8:58 it\u2019s um.... something bad...\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f 5:12 honestly that is scary\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f 6:54 and i thought they figured that out years ago",16,459],["\ud83d\udde3\ufe0f i got a shein ad during this video \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i got a shein ad on this video \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i got a shein ad on this video \u003cemoji\u003e",22,214],["\ud83d\udde3\ufe0f for me myself, i don\u2019t buy shein, but i do buy forever 21. but i don\u2019t follow fashion trends. i have an alt clothing style. so, that means that even thought i do shop at forever 21, h&m, hot topic, etc, i don\u2019t get rid of my clothes as soon as they\u2019re out of style. because i don\u2019t follow normal fashion trends, i\u2019ve had lots of the same clothes for years and years, and i resuse them, wash them, and make new outfits. i really hate how people think to be glamorous, you have to have different outfits every day. you dont ^^ reuse shirts and pants to make new different combinations. reuse jewelry to make even better jewelry matching. and most important, wear what you want to wear. don\u2019t follow fashion trends if you don\u2019t want to. wear what makes you feel comfortable, and if people hate you for wearing pieces of fabric that\u2019s different from theirs, who cares! it\u2019s your body, your decision \u003cemoji\u003e\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f as someone who works in the fashion industry it is a challenge to appear on trend, yet having a heart that says i don\u2019t need new clothes. i have a closet full of clothes that are beautiful, good quality, fit well but i still have trouble wearing the same outfits over and over. normalize repeating outfits!!\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f guys, we need to normalise re-wearing clothes and outfit repeating. it is literally the only way to solve all the problems that fast fashion perpetuate (overconsumption and needless waste, pollution, shitty quality clothes, sweatshops). i know we all like the dopamine hit we get when we buy new things (especially when it's a bargain). i know we like it when people compliment us when we are wearing something new and pretty. but seriously, living this way is destroying our environment and promoting the exploitation of people (mostly women and children) in developing countries. so guys, wherever possible, buy secondhand. and if you must buy brand new, cherish the item! look after it, wear it multiple times until it gets holes, then stitch up the holes and wear the item multiple more times!",13,387],["\ud83d\udde3\ufe0f i\u2019m southeast asian and even the cheapest shein clothes still quite expensive for me so i\u2019ve never buy one. i rarely buy new clothes, when i do i bought them from thrifted and will only buy one if it\u2019s around $3 or under $6 (though in my country, thrifting has become sooo well known that sellers can charge for more than $10 for a single used clothes). all those fast fashion brand such as h&m, zara, forever21 and uniqlo to me is an expensive brand. i only have 1 or 2 clothes with that brand and i treasure them so much and i use it for special occasions. this is so sad that those are actually cheap clothes and they throw away hundred clothes meanwhile in another side of world, there\u2019s someone who actually treasure the brand with thoughts it\u2019s an expensive brand.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i'm in the sort of weird \"stuck between a rock and a hard place\" clothing sphere. i buy cheap clothes because that's all i can afford. i am aware of how bad it is for the people who make it and the environment, however i have no choice in the matter due to constant financial struggles. while i buy cheap, i also buy seldom. last time i bought clothes was 2020. while i participate in what you would call \"fast fashion\" i actually keep my clothes for years and years until they cant be publicly presentable anymore, at which point they become at home clothes until they get so damaged that repairing them just isn't worth the hassle.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f some people such as myself shop from shein out of necessity. i have $150 for the whole season, not for a couple of pieces. ethical fashion is very out of reach for me. yes i shop thrift stores but honestly thrift stores are increasing picked through by resellers and i end up feeling not put together when my whole outfit is thrifted. plus a thrifted wardrobe is hard to make feel cohesive and complete, i always feel slightly messy. i just bought four viscose maxi dresses and four cotton long sleeve tops for $89 and i love them and wear them every day, i have a minimal capsule wardrobe and will wear these pieces until they fall apart. i think a lot of people who look down on fast fashion are in positions of privilege and have extra income to allocate towards fashion. i shop as responsibly as i can afford to and i am minimal in my purchases. i also hand wash all of my clothing to extend their lives. just another perspective \u003cemoji\u003e",29,651],["\ud83d\udde3\ufe0f who is still shopping from shein? their clothes are complete garbage and not even actually worth paying $1. i partake in fast fashion, but i only buy if i think it will last a year. shein might as well be disposable clothing\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f there is no second hand market for shein clothing. it falls apart quickly, it becomes ugly quickly, and most goodwills are so fully stocked with thousands of shein pieces nowadays, most of them are refusing shein pieces now. so these clothes end up in the trash.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i only bought from shein one time because i was drawn in by the cheap prices. i will never do it again. i ended up donating everything i got because it fit so bad and i am someone who never has problems with fit. i'm not surprised to find this out about shein. this is why i am willing to pay more money for higher quality and sustainable clothing. i wear my clothes for a few years and will even resell them if they are still in good condition after that so i don't mind paying up for clothes.",4,416],["\ud83d\udde3\ufe0f never heard of shein but i will happily continue not purchasing their products\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i never even heard of shein until now.\u003cbr\u003e\u003cbr\u003e\ud83d\udde3\ufe0f i never knew about shein until after seeing how horrible of a company it is",48,495]],"hovertemplate":"\u003cb\u003e%{hovertext}\u003c\u002fb\u003e\u003cbr\u003e\u003cbr\u003elift_sheinLabor_vs_nonSheinLabor=%{x}\u003cbr\u003elabel=%{y}\u003cbr\u003eexamples=%{customdata[0]}\u003cbr\u003en_comments=%{customdata[2]}\u003cbr\u003enet_negative=%{marker.color}\u003cextra\u003e\u003c\u002fextra\u003e","hovertext":[" \u003cemoji: He got that ptsd . \u003cemojosh: \"That was \u003cem emoji\u003e her reaction the whole time got me \u003cemmoosh\""," The clothing sold by the major high street brands and many of the top labels too, arent manufactured under significantly superior working conditions . The clothes maybe better quality but the working conditions, pay, safety and job security are often just as bad . The main issue is that most clothing is un"," When humans are left to their own vices you get stuff like this. this is why we need government regulation. when ppl and companies get so much money they\u2019ll start to not care about the conditions for their workers and eventually the quality of their products ."," i worked 21 days in a row at 12 hours a day in the food industry . i worked when i am little but it was my choice due to financial issue . i was 16 and a drop out. only reason i got in was cause my mother worked one too .",""," i have clothes from high-school i still wear often it's probably half my wardrobe and i'm nearly thirty \u003cemoji\u003e The clothes i wear, get used all the time, things that get dirty and stained become my work clothes, i don\u2019t understand why people buy"," i only boug
